name: Visual Regression Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect visual-path changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          printf '%s\n' "$changed_files"

          should_run=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/visual-regression.yml|\
              index.html|\
              vite.config.ts|\
              playwright.config.ts|\
              src/*|\
              src/**|\
              public/*|\
              public/**|\
              tests/e2e/visual-regression.spec.ts|\
              tests/e2e/visual-regression.spec.ts-snapshots/*|\
              tests/e2e/visual-regression.spec.ts-snapshots/**|\
              tests/e2e/app.spec.ts|\
              tests/e2e/app.spec.ts-snapshots/*|\
              tests/e2e/app.spec.ts-snapshots/**)
                should_run=true
                ;;
            esac
          done <<< "$changed_files"

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "reason=visual-path-filter" >> "$GITHUB_OUTPUT"

      - name: Skip non-visual changes
        if: steps.scope.outputs.should_run != 'true'
        run: echo "Visual regression skipped because this change did not touch a visual surface or its baselines."

      - name: Setup Node
        if: steps.scope.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.scope.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.scope.outputs.should_run == 'true'
        run: npx playwright install chromium

      - name: Run visual regression suite
        if: steps.scope.outputs.should_run == 'true'
        id: visual
        continue-on-error: true
        run: CI=1 npm run test:visual -- --reporter=line,html

      - name: Collect visual drift report
        if: steps.scope.outputs.should_run == 'true' && always()
        run: npm run visual:drift-report -- --root test-results --out output

      - name: Publish visual drift summary
        if: steps.scope.outputs.should_run == 'true' && always()
        run: |
          if [ -f output/visual-drift-summary.md ]; then
            cat output/visual-drift-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload visual drift artifacts
        if: steps.scope.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-drift-${{ github.run_id }}
          path: |
            test-results
            playwright-report
            output/visual-drift-report.json
            output/visual-drift-summary.md
          if-no-files-found: warn

      - name: Enforce visual gate
        if: steps.scope.outputs.should_run == 'true' && steps.visual.outcome == 'failure'
        run: |
          echo "Unapproved visual drift detected. Review uploaded diff artifacts."
          exit 1
